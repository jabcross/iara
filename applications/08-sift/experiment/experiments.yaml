# SIFT Feature Detection Experiment Configuration
#
# IaRa vf-omp vs Preesm baseline comparison.
# Image size is fixed at 800x640 (hardcoded in topology.mlir and codegen.sh).
# Varying parameter: NUM_CORES (number of CPU cores for parallelism).

application:
  name: 08-sift
  description: "SIFT feature detection using IaRa dataflow"
  app_type: experiment
  build:
    extra_linker_args: ["-lm"]
    main_actor: "Hextract"

    # Compile-time defines always present
    defines:
      - "VERBOSE=1"

parameters:
  # Number of CPU cores for parallel execution
  - name: NUM_CORES
    type: int
    label: "CPU Cores"
    description: "Number of CPU cores for parallel execution"

  # Scheduler selection
  - name: scheduler
    type: str
    label: "Scheduler"
    description: "Task scheduling strategy"
    choices:
      - vf-omp    # IaRa Virtual FIFO with OpenMP backend
      - preesm    # Preesm reference implementation

computed_parameters: []

constraints:
  - expression: "NUM_CORES > 0"
    description: "Number of cores must be positive"

# Measurement definitions
measurements:
  - name: keypoints_found
    type: int
    parser:
      type: regex
      pattern: 'Keypoints found:\s+(\d+)'
      group: 1
    unit: count
    required: false
    description: "Number of keypoints detected"

# Experiment sets
experiment_sets:
  # Single core, both schedulers — fast sanity check
  - name: quick
    description: "Quick sanity check: 1 core, both schedulers"
    parameters:
      NUM_CORES: [1]
      scheduler: [vf-omp, preesm]

  # IaRa vs Preesm across core counts (original repo: 1-core and 4-core scenarios)
  - name: compare
    description: "IaRa vf-omp vs Preesm on 1 and 4 cores"
    parameters:
      NUM_CORES: [1, 4]
      scheduler: [vf-omp, preesm]

  # Reproduces Table 1 from Honorat et al. 2019 (SIFT SDF iterators paper).
  # Core counts {1,2,4,5,10} are the common divisors of the 4-D array sizes
  # used in SIFT, matching the original Preesm vs OpenMP evaluation exactly.
  - name: paper
    description: "Table 1 reproduction: 1/2/4/5/10 cores, IaRa vf-omp vs Preesm"
    parameters:
      NUM_CORES: [1, 2, 4, 5, 10]
      scheduler: [vf-omp, preesm]

# Execution configuration
execution:
  repetitions: 3
  warmup: 1
  timeout: 120
  environment:
    # {NUM_CORES} is substituted per-instance by the experiment framework.
    # Preesm binaries use pthreads (not OMP); this only affects IaRa vf-omp.
    OMP_NUM_THREADS: "{NUM_CORES}"
    OMP_PROC_BIND: "close"
    OMP_PLACES: "cores"
    PARALLELISM_LEVEL: "{NUM_CORES}"

# Visualization configuration
visualization:
  plots:
    wall_time:
      title: "SIFT Runtime Wall Time"
      type: grouped_bars
      y_axis:
        metric: wall_time
      x_axis:
        NUM_CORES: group_by
      scheduler: ordered_within_group
