application:
  name: 03-two-nodes
  description: "Simple two-node dataflow test"
  app_type: regression_test

  sources:
    - main.c

  build:
    extra_linker_args: []
    defines: []


test_naming:
  template: "03-two-nodes-{scheduler}"
  description: "Two-nodes test naming pattern"

parameters:
  - name: scheduler
    type: str
    label: "Scheduler"
    description: "Task scheduling strategy"
    choices:
      - vf-sequential
      - vf-omp
      - vf-enkits

constraints: []

measurements: []

experiment_sets:

  - name: tests
    description: "Tests with all schedulers"
    parameters:
      scheduler:
        - vf-sequential
        - vf-omp
        - vf-enkits

execution:
  repetitions: 1
  timeout: 60
  description: "Single run, 60 second timeout per test"

csv_output:
  columns:
    - scheduler
  description: "Scheduler used"
