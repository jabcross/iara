application:
  name: 14-broadcast-struct
  description: "Regression test: broadcast of struct types (element size > pointer size)"
  app_type: regression_test

  sources:
    - kernels.cpp

  build:
    extra_linker_args: []
    defines: []


test_naming:
  template: "14-broadcast-struct-{scheduler}"
  description: "Broadcast struct test naming pattern"

parameters:
  - name: scheduler
    type: str
    label: "Scheduler"
    description: "Task scheduling strategy"
    choices:
      - vf-sequential
      - vf-omp
      - vf-enkits

constraints: []


experiment_sets:

  - name: tests
    description: "Tests with all schedulers"
    parameters:
      scheduler:
        - vf-sequential
        - vf-omp
        - vf-enkits

execution:
  repetitions: 1
  timeout: 60
  description: "Single run, 60 second timeout per test"

csv_output:
  columns:
    - scheduler
  description: "Scheduler used"
